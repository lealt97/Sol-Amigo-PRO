name: Validar ações de propostas finalizadas

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: validate-finalized-proposal-actions
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Atualizar testes legados
        shell: bash
        run: |
          python3 .github/scripts/update-finalized-proposal-tests.py
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add tests
            git commit -m "test: alinhar regras de propostas finalizadas"
            git push origin HEAD:main
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Executar validações
        shell: bash
        run: |
          set +e
          npm ci > /tmp/npm-ci.log 2>&1
          CI_STATUS=$?
          npm run typecheck > /tmp/typecheck.log 2>&1
          TYPE_STATUS=$?
          npm run test > /tmp/test.log 2>&1
          TEST_STATUS=$?
          npm run build:app > /tmp/build.log 2>&1
          BUILD_STATUS=$?

          {
            echo "npm_ci=$CI_STATUS"
            echo "typecheck=$TYPE_STATUS"
            echo "tests=$TEST_STATUS"
            echo "build=$BUILD_STATUS"
            echo
            echo "=== TYPECHECK ==="
            tail -n 80 /tmp/typecheck.log
            echo
            echo "=== TEST FAILURES ==="
            grep -n -B 8 -A 30 '^not ok' /tmp/test.log || true
            echo
            echo "=== TEST SUMMARY ==="
            tail -n 30 /tmp/test.log
            echo
            echo "=== BUILD ==="
            tail -n 80 /tmp/build.log
          } > .github/validation-finalized-proposal-actions.txt

      - name: Publicar resultado
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/validation-finalized-proposal-actions.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: registrar validação das ações de propostas"
          git push origin HEAD:main
