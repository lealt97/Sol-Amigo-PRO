name: Aplicar área de telhado opcional

on:
  push:
    branches: [main]
    paths:
      - '.github/scripts/apply-optional-roof-area.py'
      - '.github/workflows/apply-optional-roof-area.yml'

permissions:
  contents: write

jobs:
  apply-change:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Aplicar alteração
        run: python .github/scripts/apply-optional-roof-area.py

      - name: Commitar funcionalidade
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/propostas/ProfessionalSizingCalculatorView.tsx tests/optional-roof-area.test.ts
          if git diff --cached --quiet; then
            echo "Nenhuma alteração necessária."
            exit 0
          fi
          git commit -m "fix: tornar área do telhado opcional"
          git push origin main
