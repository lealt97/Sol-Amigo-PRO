name: Aplicar tema no gráfico de payback

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: one-time-themed-payback-chart
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Aplicar tema e barras retas
        run: python3 .github/scripts/apply-themed-payback-chart.py

      - name: Publicar alteração
        shell: bash
        run: |
          if git diff --quiet; then
            echo "O gráfico já usa o motor de cores e barras retas."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/propostas/PaybackStep.tsx tests/payback-flow.test.ts
          git commit -m "style: integrar gráfico de payback ao motor de cores"
          git push origin HEAD:main
