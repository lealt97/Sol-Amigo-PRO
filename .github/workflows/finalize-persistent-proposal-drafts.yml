name: Finalizar rascunhos persistentes

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: one-time-finalize-persistent-proposal-drafts
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Aplicar correções finais
        run: python3 .github/scripts/finalize-persistent-proposal-drafts.py

      - name: Publicar alteração
        shell: bash
        run: |
          if git diff --quiet; then
            echo "As correções finais já estão aplicadas."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/propostas/PaybackStep.tsx src/pages/propostas/ProposalList.tsx src/pages/propostas/ProfessionalSizingCalculatorView.tsx src/services/proposalService.ts supabase-schema.sql
          git commit -m "fix: finalizar persistência dos rascunhos de proposta"
          git push origin HEAD:main
