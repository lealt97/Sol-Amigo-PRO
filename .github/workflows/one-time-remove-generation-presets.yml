# execução única 3
name: Remover atalhos de geração

on:
  push:
    paths:
      - '.github/workflows/one-time-remove-generation-presets.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Manter somente o input de geração adicional
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          calculator_path = Path('src/pages/propostas/ProfessionalSizingCalculatorView.tsx')
          source = calculator_path.read_text(encoding='utf-8')

          old_block = '''                <div className="rounded-xl border border-brand-border bg-brand-gray/30 p-5">
                  <div className="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
                    <div className="max-w-md flex-1">
                      <Field
                        label="Geração adicional desejada"
                        value={generationIncreasePercent}
                        onChange={setGenerationIncreasePercent}
                        suffix="%"
                        min={0}
                        max={100}
                        step="1"
                        helper="O percentual é aplicado sobre o consumo compensável. Use 0% quando o cliente não solicitar geração adicional."
                      />
                    </div>
                    <div className="flex flex-wrap gap-2">
                      {[0, 10, 20, 30].map((percentage) => (
                        <Button
                          key={percentage}
                          type="button"
                          variant={generationIncreasePercent === String(percentage) ? 'default' : 'outline'}
                          onClick={() => setGenerationIncreasePercent(String(percentage))}
                        >
                          {percentage}%
                        </Button>
                      ))}
                    </div>
                  </div>
                </div>'''

          new_block = '''                <div className="rounded-xl border border-brand-border bg-brand-gray/30 p-5">
                  <div className="max-w-md">
                    <Field
                      label="Geração adicional desejada"
                      value={generationIncreasePercent}
                      onChange={setGenerationIncreasePercent}
                      suffix="%"
                      min={0}
                      max={100}
                      step="1"
                      helper="O percentual é aplicado sobre o consumo compensável. Use 0% quando o cliente não solicitar geração adicional."
                    />
                  </div>
                </div>'''

          if old_block not in source:
              raise SystemExit('Bloco de atalhos de geração não encontrado.')

          source = source.replace(old_block, new_block, 1)

          forbidden = [
              '[0, 10, 20, 30]',
              'setGenerationIncreasePercent(String(percentage))',
          ]
          for token in forbidden:
              if token in source:
                  raise SystemExit(f'Atalho fixo ainda presente: {token}')

          calculator_path.write_text(source, encoding='utf-8')

          test_path = Path('tests/p2-launch-readiness.test.ts')
          tests = test_path.read_text(encoding='utf-8')
          marker = '  assert.match(calculator, /Geração adicional desejada/);\n'
          assertion = '  assert.doesNotMatch(calculator, /\\[0, 10, 20, 30\\]|setGenerationIncreasePercent\\(String\\(percentage\\)\\)/);\n'
          if assertion not in tests:
              if marker not in tests:
                  raise SystemExit('Marcador do teste de geração adicional não encontrado.')
              tests = tests.replace(marker, marker + assertion, 1)
          test_path.write_text(tests, encoding='utf-8')

          Path('.github/workflows/one-time-remove-generation-presets.yml').unlink()
          PY

      - name: Publicar alteração na main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: manter somente input para geração adicional"
          git push origin HEAD:main
