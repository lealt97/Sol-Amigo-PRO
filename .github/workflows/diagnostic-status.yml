name: Diagnóstico de build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: diagnostic-status-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    name: Diagnosticar TypeScript, testes e build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Aplicar truncamento visual de potência
        if: github.event_name == 'push'
        run: python3 .github/scripts/apply-power-display-truncation.py

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        id: install
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm ci 2>&1 | tee install.log

      - name: Publicar diagnóstico da instalação
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          OUTCOME: ${{ steps.install.outcome }}
        shell: bash
        run: |
          python3 .github/scripts/publish-diagnostic-status.py \
            --repository "$GITHUB_REPOSITORY" \
            --sha "$GITHUB_SHA" \
            --context "Diagnóstico / npm ci" \
            --outcome "$OUTCOME" \
            --log install.log

      - name: Verificar TypeScript
        id: typecheck
        if: steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log

      - name: Publicar diagnóstico do TypeScript
        if: always() && steps.install.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          OUTCOME: ${{ steps.typecheck.outcome }}
        shell: bash
        run: |
          python3 .github/scripts/publish-diagnostic-status.py \
            --repository "$GITHUB_REPOSITORY" \
            --sha "$GITHUB_SHA" \
            --context "Diagnóstico / TypeScript" \
            --outcome "$OUTCOME" \
            --log typecheck.log

      - name: Executar testes
        id: tests
        if: steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run test 2>&1 | tee tests.log

      - name: Publicar diagnóstico dos testes
        if: always() && steps.install.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          OUTCOME: ${{ steps.tests.outcome }}
        shell: bash
        run: |
          python3 .github/scripts/publish-diagnostic-status.py \
            --repository "$GITHUB_REPOSITORY" \
            --sha "$GITHUB_SHA" \
            --context "Diagnóstico / Testes" \
            --outcome "$OUTCOME" \
            --log tests.log

      - name: Gerar build de produção
        id: build
        if: steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run build:app 2>&1 | tee build.log

      - name: Publicar diagnóstico do build
        if: always() && steps.install.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          OUTCOME: ${{ steps.build.outcome }}
        shell: bash
        run: |
          python3 .github/scripts/publish-diagnostic-status.py \
            --repository "$GITHUB_REPOSITORY" \
            --sha "$GITHUB_SHA" \
            --context "Diagnóstico / Build" \
            --outcome "$OUTCOME" \
            --log build.log

      - name: Commitar truncamento visual de potência
        if: github.event_name == 'push' && steps.install.outcome == 'success' && steps.typecheck.outcome == 'success' && steps.tests.outcome == 'success' && steps.build.outcome == 'success'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/formatters/technicalNumber.ts src/pages/propostas/ProfessionalSizingCalculatorView.tsx tests/power-display-truncation.test.ts
          if git diff --cached --quiet; then
            echo "Nenhuma alteração funcional necessária."
            exit 0
          fi
          git commit -m "fix: truncar potência em duas casas decimais"
          git push origin main

      - name: Registrar conclusão informativa
        if: always()
        shell: bash
        run: |
          echo "Este workflow publica diagnósticos por etapa. O gate obrigatório permanece no workflow Qualidade."
