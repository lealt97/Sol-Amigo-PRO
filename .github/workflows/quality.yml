name: Qualidade

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-profile-avatar:
    name: Gerar arquivos da foto de perfil
    if: github.event_name == 'pull_request' && github.head_ref == 'feat/profile-avatar-navbar'
    runs-on: ubuntu-latest
    steps:
      - name: Baixar branch da PR
        uses: actions/checkout@v4
        with:
          ref: feat/profile-avatar-navbar

      - name: Aplicar alterações preparadas
        run: |
          python3 .github/scripts/apply-profile-avatar-core.py
          python3 .github/scripts/apply-profile-avatar-settings.py
          python3 .github/scripts/apply-profile-avatar-tests.py

      - name: Publicar arquivos gerados
        uses: actions/upload-artifact@v4
        with:
          name: profile-avatar-generated
          path: |
            src/pages/Configuracoes.tsx
            src/components/Layout.tsx
            src/services/profileService.ts
            src/types/profile.ts
            supabase/migrations/20260720003000_profile_avatar.sql
            supabase/tests/profile_avatar.sql
            tests/profile-avatar.test.ts
            .github/workflows/migrations-homologation.yml
          if-no-files-found: error
          retention-days: 1

  quality:
    name: TypeScript completo, testes e build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Executar validações completas
        run: npm run check

  e2e:
    name: Playwright E2E — navegadores e dispositivos
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Instalar navegadores e dependências
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Executar testes E2E
        run: npm run test:e2e

      - name: Publicar relatório do Playwright
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
